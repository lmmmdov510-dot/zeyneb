<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeyneb - Ad Günün Mübarək! 🎂</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; font-family: 'Georgia', serif; overflow: hidden; height: 100vh; }
  #scene { width: 100%; height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 30px; }

  /* Stars */
  .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite alternate; }
  @keyframes twinkle { from { opacity: 0.2; transform: scale(1); } to { opacity: 1; transform: scale(1.4); } }

  /* Candles */
  #cake-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; }
  .candles-row { display: flex; gap: 18px; justify-content: center; margin-bottom: 0px; position: relative; z-index: 5; }
  .candle { display: flex; flex-direction: column; align-items: center; }
  .flame {
    width: 10px; height: 18px;
    background: radial-gradient(ellipse at center, #fff8cc 20%, #ffcc00 50%, #ff6600 100%);
    border-radius: 50% 50% 30% 30%;
    animation: flicker 0.4s infinite alternate;
    transform-origin: bottom center;
    box-shadow: 0 0 8px 4px rgba(255,180,0,0.5);
  }
  .flame.out { display: none; }
  @keyframes flicker {
    from { transform: skewX(-8deg) scaleY(1); }
    to   { transform: skewX(8deg) scaleY(0.85); }
  }
  .wick { width: 2px; height: 6px; background: #555; }
  .candle-body { width: 10px; height: 36px; border-radius: 3px 3px 0 0; }

  /* Cake */
  #cake { position: relative; z-index: 4; }
  .cake-top {
    width: 160px; height: 44px;
    background: linear-gradient(180deg, #f9a8d4, #ec4899);
    border-radius: 8px 8px 0 0;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  .cake-mid {
    width: 180px; height: 44px;
    background: linear-gradient(180deg, #fde68a, #f59e0b);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .cake-bot {
    width: 200px; height: 50px;
    background: linear-gradient(180deg, #a78bfa, #7c3aed);
    border-radius: 4px 4px 8px 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .dots { display: flex; gap: 8px; }
  .dot { width: 10px; height: 10px; background: white; border-radius: 50%; opacity: 0.7; }
  .stripes { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 11px; letter-spacing: 8px; color: rgba(255,255,255,0.4); }
  .cake-plate { width: 220px; height: 14px; background: #d1d5db; border-radius: 50%; margin-top: 2px; }

  /* Blow button */
  #blow-btn {
    margin-top: 18px; padding: 10px 28px;
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.3);
    color: white; border-radius: 30px; font-size: 15px;
    cursor: pointer; letter-spacing: 1px; transition: background 0.2s; z-index: 10;
  }
  #blow-btn:hover { background: rgba(255,255,255,0.22); }
  #blow-btn:active { transform: scale(0.96); }
  #blow-btn:disabled { opacity: 0.4; cursor: default; }

  /* Message */
  #message {
    position: absolute; top: 14%; left: 50%;
    transform: translateX(-50%) scale(0);
    text-align: center; z-index: 20;
    transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  #message.show { transform: translateX(-50%) scale(1); }
  #message .name  { font-size: 34px; color: #fde68a; text-shadow: 0 0 20px #f59e0b; font-style: italic; letter-spacing: 2px; }
  #message .line1 { font-size: 22px; color: #f9a8d4; margin-top: 6px; text-shadow: 0 0 12px #ec4899; }
  #message .line2 { font-size: 16px; color: #c4b5fd; margin-top: 6px; letter-spacing: 1px; }
  #message .line3 { font-size: 14px; color: #6ee7b7; margin-top: 4px; }

  /* Confetti */
  .confetti {
    position: absolute; width: 8px; height: 8px;
    opacity: 0; border-radius: 2px;
    animation: fall 2.5s ease-in forwards; z-index: 15;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Smoke */
  .smoke {
    position: fixed; width: 10px; height: 10px;
    background: rgba(200,200,200,0.5); border-radius: 50%;
    animation: smokeUp 1s ease-out forwards; pointer-events: none;
  }
  @keyframes smokeUp {
    0%   { transform: scale(0.5) translateY(0); opacity: 0.7; }
    100% { transform: scale(2.5) translateY(-30px); opacity: 0; }
  }
</style>
</head>
<body>
<div id="scene">
  <div id="stars-container"></div>

  <div id="message">
    <div class="name">🌸 Zeyneb 🌸</div>
    <div class="line1">Ad günün mübarək, bacım!</div>
    <div class="line2">❤️ Sevgi dolu bir il diləyirəm ❤️</div>
    <div class="line3">Həmişə xoşbəxt, sağlam və gülərüz ol 🌼</div>
  </div>

  <div id="cake-wrapper">
    <div class="candles-row" id="candles-row"></div>
    <div id="cake">
      <div class="cake-top"><span>🌸🍓🌸</span></div>
      <div class="cake-mid"><div class="dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div>
      </div></div>
      <div class="cake-bot"><div class="stripes">✦ ✦ ✦</div></div>
    </div>
    <div class="cake-plate"></div>
  </div>

  <button id="blow-btn" onclick="blowCandles()">🌬️ Şamları üflə!</button>
</div>

<script>
  const candleColors = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6'];
  let blown = false;
  let blowCount = 0;

  function createStars() {
    const container = document.getElementById('stars-container');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = Math.random() * 2.5 + 1;
      s.style.cssText = `
        width:${sz}px; height:${sz}px;
        top:${Math.random() * 85}%; left:${Math.random() * 100}%;
        animation-delay:${Math.random() * 2}s;
        animation-duration:${1.5 + Math.random()}s
      `;
      container.appendChild(s);
    }
  }

  function createCandles() {
    const row = document.getElementById('candles-row');
    row.innerHTML = '';
    for (let i = 0; i < 6; i++) {
      const c = document.createElement('div');
      c.className = 'candle';
      c.innerHTML = `
        <div class="flame" id="flame${i}"></div>
        <div class="wick"></div>
        <div class="candle-body" style="background:${candleColors[i]}"></div>
      `;
      row.appendChild(c);
    }
  }

  function blowCandles() {
    if (blown) return;
    blowCount++;
    const btn = document.getElementById('blow-btn');
    const total = 6;
    const toOut = Math.min(blowCount * 2, total);

    for (let i = 0; i < toOut; i++) {
      const f = document.getElementById('flame' + i);
      if (f) { f.classList.add('out'); addSmoke(f); }
    }

    if (toOut >= total) {
      blown = true;
      btn.disabled = true;
      btn.textContent = '🎉 Mübarək, Zeyneb!';
      setTimeout(showMessage, 500);
      setTimeout(launchConfetti, 300);
    } else {
      btn.textContent = `🌬️ Daha güclü! (${total - toOut} qaldı)`;
    }
  }

  function addSmoke(flameEl) {
    const rect = flameEl.getBoundingClientRect();
    for (let i = 0; i < 3; i++) {
      const s = document.createElement('div');
      s.className = 'smoke';
      s.style.left = (rect.left + rect.width / 2 - 5 + (Math.random() - 0.5) * 10) + 'px';
      s.style.top  = (rect.top - 10) + 'px';
      s.style.animationDelay = (i * 0.15) + 's';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 1200);
    }
  }

  function showMessage() {
    document.getElementById('message').classList.add('show');
  }

  function launchConfetti() {
    const colors = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#06b6d4','#ffffff'];
    for (let i = 0; i < 70; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top  = '-10px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        el.style.animationDelay    = (Math.random() * 1.5) + 's';
        el.style.transform = `rotate(${Math.random() * 360}deg)`;
        if (Math.random() > 0.5) el.style.borderRadius = '50%';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }, i * 30);
    }
  }

  createStars();
  createCandles();
</script>
</body>
</html>
